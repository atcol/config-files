name: "Test"
on:
  pull_request:
  push:
    branches: [master]
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2.3.4
    - uses: cachix/install-nix-action@v13
      with:
        nix_path: nixpkgs=channel:nixos-unstable
    - name: Install home-manager
      run: |
        nix-channel --add https://github.com/nix-community/home-manager/archive/master.tar.gz home-manager
        nix-channel --update
        export NIX_PATH=$HOME/.nix-defexpr/channels${NIX_PATH:+:}$NIX_PATH
        nix-shell '<home-manager>' -A install
        mkdir -p ~/.config/nixpkgs
        rm -rf ${HOME}/.config/nixpkgs/home.nix
        ln -s ${PWD}/home.nix ${HOME}/.config/nixpkgs/home.nix
        export PATH=$HOME/.nix-profile/bin:$PATH
        home-manager switch
    - name: Verify installed packages
      run: |
        export PATH=$HOME/.nix-profile/bin:$PATH
        echo "Verifying key packages are installed..."
        command -v git
        command -v gh
        command -v jq
        command -v ripgrep || command -v rg
        command -v bat
        command -v fd
        command -v tmux
        command -v fzf
        command -v starship
        command -v kubectl
        command -v kraken
        echo "All expected packages verified."
    - name: Verify shell configuration
      run: |
        export PATH=$HOME/.nix-profile/bin:$PATH
        test -f ${HOME}/.config/fish/config.fish && echo "Fish config exists" || (echo "Fish config missing" && exit 1)
